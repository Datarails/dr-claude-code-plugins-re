# Canonical source: dr-internal-plugins/tools/public-workflows/version-bump.yml
# Install location: Datarails/dr-claude-code-plugins-re/.github/workflows/version-bump.yml
#
# This workflow lives on the public mirror. The dr-internal-plugins publish
# script intentionally does NOT sync .github/ to public, so updates to this
# file must be applied to the public repo manually (same as
# auto-tag-on-promotion-merge.yml).
#
# Public mirror of dr-internal-plugins' version-bump.yml, adapted to the public
# repo's single-plugin, tag-driven, no-CHANGELOG shape:
#   - one plugin at the repo root (.claude-plugin/plugin.json), so there is no
#     `plugin` input — only `bump_type`.
#   - no per-plugin CHANGELOG; release notes are auto-generated by release.yml
#     (`generate_release_notes: true`), so there is no CHANGELOG-promotion step.
#   - a simpler release flow than internal: a single bump commit + tag pushed
#     to main, rather than internal's release-PR-then-merge sequence.
#   - the v<version> tag is pushed with the GitHub App token so the existing
#     `Release Plugin` (release.yml) workflow fires. The default GITHUB_TOKEN
#     cannot trigger other workflows — same App-token trick auto-tag uses.
#
# Use this for out-of-band hotfixes merged directly to public (a normal
# promotion from internal still tags via auto-tag-on-promotion-merge.yml).
# Keep bumps forward-moving: this version line is not auto-reconciled with the
# internal repo's version.

name: Version bump

run-name: Version bump (${{ inputs.bump_type }})

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: Bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read   # write is granted via the App token, not the default token

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "dr-internal-plugins[bot]"
          git config user.email "dr-internal-plugins[bot]@users.noreply.github.com"

      - name: Bump version in plugin.json
        id: bump
        env:
          BUMP: ${{ inputs.bump_type }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os, pathlib, re, sys
          bump = os.environ["BUMP"]
          plugin_json = pathlib.Path(".claude-plugin/plugin.json")
          pj_text = plugin_json.read_text()
          match = re.search(r'"version":\s*"(\d+)\.(\d+)\.(\d+)"', pj_text)
          if not match:
              sys.exit(f"version field not found in {plugin_json}")
          major, minor, patch = (int(x) for x in match.groups())
          if bump == "major":
              major, minor, patch = major + 1, 0, 0
          elif bump == "minor":
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new_version = f"{major}.{minor}.{patch}"
          # Surgical regex sub preserves indentation, key order, and array
          # formatting elsewhere in the manifest.
          pj_new = re.sub(
              r'("version":\s*")\d+\.\d+\.\d+(")',
              rf'\g<1>{new_version}\g<2>',
              pj_text,
              count=1,
          )
          plugin_json.write_text(pj_new)
          print(f"new_version={new_version}")
          print(f"tag=v{new_version}")
          PY

      - name: Guard against an existing tag
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::tag $TAG already exists — bump again or delete the stale tag"
            exit 1
          fi

      - name: Commit bump to main
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          git add .claude-plugin/plugin.json
          git commit -m "Release v${NEW_VERSION}"
          git push origin HEAD:main

      - name: Tag and push (fires Release Plugin)
        env:
          TAG: ${{ steps.bump.outputs.tag }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "::notice title=Tag pushed::$TAG — the Release Plugin workflow should now build the ZIP and publish the GitHub Release."
